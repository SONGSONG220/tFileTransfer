name: APK Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # Manual trigger bhi kar sako

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17 setup (Android modern projects ke liye)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle cache (build fast hogi)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. gradlew ko executable banao
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. APK build karo (debug — no signing needed)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. APK upload karo as artifact (download kar sako)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZentroShare-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
